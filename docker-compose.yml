version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pova-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-pova}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pova-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-pova}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret}
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "5000:5000"
    depends_on:
      - db

  ai-service:
    build: ./ai-service
    container_name: pova-ai
    restart: always
    ports:
      - "8000:8000"

volumes:
  postgres_data:
